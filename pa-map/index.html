    // 1. Setup Map
    var map = L.map('map_container').setView([41.2033, -77.1945], 7);

    // 2. Add Map Tiles
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
        attribution: '© OpenStreetMap contributors © CARTO',
        subdomains: 'abcd',
        maxZoom: 19
    }).addTo(map);

    // 3. Setup Clusters
    var marker_cluster = L.markerClusterGroup({ "maxClusterRadius": 35 });
    map.addLayer(marker_cluster);

    // 4. Marker Function (Now includes Type and Directions)
    function addMarker(lat, lon, name, addr, city, state, zip, phone, type, directions, color) {
        var marker = L.marker([lat, lon]).addTo(marker_cluster);
        var icon = L.AwesomeMarkers.icon({ 
            "markerColor": color, 
            "icon": "info-sign", 
            "prefix": "glyphicon" 
        });
        marker.setIcon(icon);
        
        var popupHtml = `
            <b>${name}</b><br>
            ${addr}<br>
            ${city}, ${state} ${zip}<br>
            <b>Phone:</b> ${phone}<br>
            <b>License Type:</b> ${type}<br>
            <a href="${directions}" target="_blank">Google Maps Directions</a>
        `;
        marker.bindPopup(popupHtml);
    }
