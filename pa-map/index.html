<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="content-type" content="text/html; charset=UTF-8" />
    <title>PA Hunting & Fishing Map</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.3/dist/leaflet.css"/>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.3/dist/leaflet.js"></script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet.markercluster@1.4.1/dist/MarkerCluster.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css"/>
    <script src="https://cdn.jsdelivr.net/npm/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/Leaflet.awesome-markers/2.0.2/leaflet.awesome-markers.css"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Leaflet.awesome-markers/2.0.2/leaflet.awesome-markers.js"></script>
    
    <link rel="stylesheet" href="https://netdna.bootstrapcdn.com/bootstrap/3.0.0/css/bootstrap.min.css"/>

    <style>
    /* This tells the browser the whole page is 100% */
    html, body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
    }
    /* This tells the MAP specifically to fill that 100% */
    #map_9a827d66675e775db0b7c1205376332a {
        width: 100%;
        height: 100%;
    }
</style>
</head>

<body>
    <div class="folium-map" id="map_9a827d66675e775db0b7c1205376332a"></div>
</body>

<script>
    // 3. MAP INITIALIZATION
    var map = L.map('map_9a827d66675e775db0b7c1205376332a').setView([41.2033, -77.1945], 7);

    // Background tiles
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
        attribution: '© OpenStreetMap contributors © CARTO',
        subdomains: 'abcd',
        maxZoom: 19
    }).addTo(map);

    // Setup Clusters
    var marker_cluster = L.markerClusterGroup({ "maxClusterRadius": 30 });
    map.addLayer(marker_cluster);

    // --- RACHEL'S HARDWARE ---
    var marker1 = L.marker([41.00287, -78.16364]).addTo(marker_cluster);
    var icon1 = L.AwesomeMarkers.icon({ "markerColor": "blue", "icon": "info-sign", "prefix": "glyphicon" });
    marker1.setIcon(icon1);
    marker1.bindPopup(`<div style="font-family: sans-serif; font-size: 11px;"><b>Rachel's Hardware</b><br>Kylerstown</div>`);

    // --- GUNSLINGER ---
    var marker2 = L.marker([40.01914034, -79.57586677]).addTo(marker_cluster);
    var icon2 = L.AwesomeMarkers.icon({ "markerColor": "green", "icon": "info-sign", "prefix": "glyphicon" });
    marker2.setIcon(icon2);
    marker2.bindPopup(`<div style="font-family: sans-serif; font-size: 11px;"><b>Gunslinger</b><br>Connellsville</div>`);

    // >>> PASTE YOUR OTHER MARKERS HERE <<<

</script>
</html>
